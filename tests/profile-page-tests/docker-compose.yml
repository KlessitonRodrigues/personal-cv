services:
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium
    shm_size: 2gb
    ports:
      - '4444:4444'
      - '7900:7900' # optional VNC viewer
    environment:
      - SE_NODE_SESSION_TIMEOUT=300

  tests:
    build: .
    container_name: test-runner
    depends_on:
      - selenium
    environment:
      SELENIUM_URL: 'http://selenium:4444/wd/hub'
    volumes:
      - .:/app
